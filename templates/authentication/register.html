{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /* ================= ENHANCED REGISTER PAGE STYLES ================= */
    
    :root {
        /* Blue color palette - #2563EB */
        --primary: #2563eb;
        --primary-light: #3b82f6;
        --primary-dark: #1d4ed8;
        --primary-rgb: 37, 99, 235;
        --secondary: #7b2cbf;
        --success: #10b981;
        --danger: #ef4444;
        --warning: #f59e0b;
        --dark: #1f2937;
        --light: #f9fafb;
        --border: #e5e7eb;
        --text-primary: #2563eb;  /* Blue text */
        --text-secondary: #2563eb; /* Blue text */
        --text-muted: #2563eb;     /* Blue text */
        --bg-card: rgba(255, 255, 255, 0.95);
        --bg-input: rgba(255,255,255,0.9);
        --gradient-primary: linear-gradient(135deg, #2563eb, #1d4ed8);
        --gradient-success: linear-gradient(135deg, #10b981, #059669);
        --box-shadow: 0 10px 40px rgba(37, 99, 235, 0.08);
        --box-shadow-hover: 0 20px 50px rgba(37, 99, 235, 0.15);
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Dark mode variables */
    body.dark {
        --primary: #2563eb;
        --primary-light: #3b82f6;
        --primary-dark: #1d4ed8;
        --secondary: #7b2cbf;
        --bg-card: rgba(30, 41, 59, 0.95);
        --bg-input: rgba(51, 65, 85, 0.9);
        --border: #475569;
        --text-primary: #2563eb;  /* Keep blue in dark mode */
        --text-secondary: #2563eb; /* Keep blue in dark mode */
        --text-muted: #3b82f6;     /* Lighter blue for muted text */
        --gradient-primary: linear-gradient(135deg, #2563eb, #1d4ed8);
    }

    /* Page Background with Animated Gradient */
    body {
        background: linear-gradient(-45deg, #e8f0fe, #dbeafe, #c7d9ff, #b3c7ff);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        min-height: 100vh;
        position: relative;
    }

    /* Dark mode background */
    body.dark {
        background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #1e293b);
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Floating Elements Background */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: 
            radial-gradient(circle at 20% 30%, rgba(37, 99, 235, 0.05) 0%, transparent 8%),
            radial-gradient(circle at 80% 70%, rgba(37, 99, 235, 0.05) 0%, transparent 8%),
            radial-gradient(circle at 40% 80%, rgba(37, 99, 235, 0.05) 0%, transparent 10%),
            radial-gradient(circle at 90% 20%, rgba(37, 99, 235, 0.05) 0%, transparent 8%),
            radial-gradient(circle at 10% 60%, rgba(37, 99, 235, 0.05) 0%, transparent 10%);
        pointer-events: none;
        z-index: 0;
        animation: floatBubbles 20s ease-in-out infinite;
    }

    /* Dark mode floating elements */
    body.dark::before {
        background-image: 
            radial-gradient(circle at 20% 30%, rgba(37, 99, 235, 0.1) 0%, transparent 8%),
            radial-gradient(circle at 80% 70%, rgba(37, 99, 235, 0.1) 0%, transparent 8%),
            radial-gradient(circle at 40% 80%, rgba(37, 99, 235, 0.1) 0%, transparent 10%),
            radial-gradient(circle at 90% 20%, rgba(37, 99, 235, 0.1) 0%, transparent 8%),
            radial-gradient(circle at 10% 60%, rgba(37, 99, 235, 0.1) 0%, transparent 10%);
    }

    @keyframes floatBubbles {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-20px) scale(1.05); }
    }

    .row {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        align-items: center;
        margin: 0;
    }

    /* Register Card */
    .card {
        border: none !important;
        border-radius: 30px !important;
        background: var(--bg-card);
        backdrop-filter: blur(10px);
        box-shadow: 0 30px 60px rgba(37, 99, 235, 0.1) !important;
        animation: slideUp 0.6s ease-out;
        overflow: hidden;
        position: relative;
    }

    /* Card Shine Effect */
    .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(37, 99, 235, 0.1), transparent);
        transition: left 0.7s ease;
        z-index: 1;
        pointer-events: none;
    }

    .card:hover::before {
        left: 100%;
    }

    /* Card Header Decoration */
    .card::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: var(--gradient-primary);
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(50px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .card-body {
        padding: 2.5rem !important;
        position: relative;
        z-index: 2;
    }

    /* Title */
    .card-title {
        text-align: center;
        margin-bottom: 2rem !important;
        position: relative;
    }

    .card-title h4 {
        font-size: 2rem;
        font-weight: 700;
        background: var(--gradient-primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
        animation: fadeInDown 0.6s ease 0.1s both;
        color: var(--primary); /* Fallback */
    }

    .card-title::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 4px;
        background: var(--gradient-primary);
        border-radius: 2px;
        animation: expandWidth 0.6s ease 0.3s both;
    }

    @keyframes expandWidth {
        from { width: 0; }
        to { width: 60px; }
    }

    /* Form Groups */
    .form-group {
        margin-bottom: 1.5rem;
        animation: fadeInUp 0.6s ease;
        animation-fill-mode: both;
        position: relative;
    }

    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.15s; }
    .form-group:nth-child(3) { animation-delay: 0.2s; }
    .form-group:nth-child(4) { animation-delay: 0.25s; }

    @keyframes fadeInDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Input Fields */
    .form-control {
        border: 2px solid var(--border) !important;
        border-radius: 15px !important;
        padding: 12px 18px !important;
        font-size: 1rem;
        transition: var(--transition);
        background: var(--bg-input);
        color: var(--text-primary); /* Blue text */
        width: 100%;
    }

    .form-control:hover {
        border-color: var(--primary) !important;
        transform: translateY(-2px);
    }

    .form-control:focus {
        border-color: var(--primary) !important;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15) !important;
        transform: translateY(-2px);
        outline: none;
    }

    /* Placeholder text color */
    .form-control::placeholder {
        color: var(--text-muted);
        opacity: 0.7;
    }

    /* All text elements get blue color */
    label, p, small, a, span, div, h1, h2, h3, h4, h5, h6 {
        color: var(--text-primary);
    }

    /* Links get primary blue */
    a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        transition: var(--transition);
    }

    a:hover {
        color: var(--primary-dark);
        text-decoration: underline;
    }

    /* Password field container */
    .position-relative {
        position: relative;
    }

    /* Show/Hide Password Toggle */
    .showPasswordToggle {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--primary);
        font-size: 0.8rem;
        font-weight: 600;
        padding: 4px 8px;
        border-radius: 20px;
        background: rgba(37, 99, 235, 0.1);
        transition: var(--transition);
        z-index: 10;
        cursor: pointer;
    }

    .showPasswordToggle:hover {
        background: var(--primary);
        color: white;
    }

    /* Submit Button */
    .submit-btn {
        background: var(--gradient-primary) !important;
        border: none !important;
        border-radius: 15px !important;
        padding: 14px 20px !important;
        font-size: 1.1rem;
        font-weight: 600;
        color: white !important; /* Button text stays white */
        width: 100%;
        cursor: pointer;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
        animation: fadeInUp 0.6s ease 0.3s both;
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        margin-top: 0.5rem;
    }

    /* Button Shine Effect */
    .submit-btn::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }

    .submit-btn:hover::before {
        width: 300px;
        height: 300px;
    }

    .submit-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4);
    }

    .submit-btn:active {
        transform: translateY(-1px);
    }

    /* Login Link */
    .login-link {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
        animation: fadeInUp 0.6s ease 0.4s both;
    }

    .login-link a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        transition: var(--transition);
    }

    .login-link a:hover {
        color: var(--primary-dark);
        text-decoration: underline;
    }

    /* Alert Messages */
    .alert {
        border-radius: 15px;
        padding: 1rem;
        margin-bottom: 1.5rem;
        animation: slideIn 0.5s ease;
        border: none;
        font-weight: 500;
    }

    .alert-danger {
        background: linear-gradient(135deg, #fee2e2, #fecaca);
        color: #991b1b; /* Keep red for errors */
        border-left: 4px solid #ef4444;
    }

    .alert-success {
        background: linear-gradient(135deg, #dcfce7, #bbf7d0);
        color: #166534; /* Keep green for success */
        border-left: 4px solid #22c55e;
    }

    .alert-warning {
        background: linear-gradient(135deg, #fef3c7, #fde68a);
        color: #92400e; /* Keep orange for warnings */
        border-left: 4px solid #f59e0b;
    }

    /* Dark mode alert adjustments */
    body.dark .alert-danger {
        background: linear-gradient(135deg, #7f1d1d, #991b1b);
        color: #fecaca;
    }

    body.dark .alert-success {
        background: linear-gradient(135deg, #14532d, #166534);
        color: #bbf7d0;
    }

    body.dark .alert-warning {
        background: linear-gradient(135deg, #713f12, #854d0e);
        color: #fef3c7;
    }

    /* Validation feedback */
    .invalid-feedback {
        color: var(--danger);
        font-size: 0.85rem;
        margin-top: 0.25rem;
        animation: fadeIn 0.3s ease;
    }

    .usernameSuccessOutput {
        color: var(--success);
        font-size: 0.85rem;
        margin-top: 0.25rem;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    /* Responsive */
    @media (max-width: 768px) {
        .card-body {
            padding: 1.5rem !important;
        }

        .card-title h4 {
            font-size: 1.5rem;
        }

        .form-control {
            padding: 10px 15px !important;
        }

        .submit-btn {
            padding: 12px 20px !important;
        }
    }

    /* Loading Spinner for Button */
    .submit-btn.loading {
        pointer-events: none;
        opacity: 0.8;
    }

    .submit-btn.loading::after {
        content: '';
        display: inline-block;
        width: 1rem;
        height: 1rem;
        border: 2px solid white;
        border-top-color: transparent;
        border-radius: 50%;
        margin-left: 0.5rem;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Focus state for form groups */
    .form-group.focused i {
        opacity: 1;
        color: var(--primary);
    }

    /* Email feedback area */
    .emailFeedBackArea {
        margin-top: 0.25rem;
    }

    /* Override for specific elements that shouldn't be blue */
    .text-success, .text-danger, .text-warning {
        /* Keep their original colors */
    }
</style>

<div class="row">
    <div class="col-md-3 col-sm-2 col-1"></div>

    <div class="col-md-6 col-sm-8 col-10">
        <div class="card mt-5">
            <div class="card-body">

                <div class="card-title py-3">
                    <h4>Create Account ✨</h4>
                </div>

                <form action="{% url 'register' %}" method="POST" id="registerForm">
                    {% csrf_token %}
                    
                    {% include 'partials/_messages.html' %}

                    <div class="form-group">
                        <input
                            type="text"
                            name="username"
                            placeholder="Username"
                            id="usernameField"
                            value="{{ fieldValues.username }}"
                            class="form-control form-control-sm"
                            required
                        />
                        <div class="invalid_feedback invalid-feedback" style="display:none"></div>
                        <p class="text-sm text-success usernameSuccessOutput"></p>
                    </div>

                    <div class="form-group">
                        <input
                            type="email"
                            name="email"
                            placeholder="Email Address"
                            class="form-control form-control-sm"
                            id="emailField"
                            value="{{ fieldValues.email }}"
                            required
                        />
                        <div class="emailFeedBackArea invalid-feedback" style="display:none"></div>
                    </div>

                    <div class="form-group position-relative">
                        <input
                            type="password"
                            name="password"
                            placeholder="Password"
                            class="form-control form-control-sm"
                            id="passwordField"
                            required
                        />
                        <small
                            class="showPasswordToggle"
                            id="showPasswordToggle"
                        >
                            SHOW
                        </small>
                    </div>

                    <input
                        type="submit"
                        value="Create Account"
                        class="btn btn-block btn-primary submit-btn"
                        id="submitBtn"
                    />

                    <p class="login-link">
                        Already have an account? <a href="{% url 'login' %}">Sign in here</a>
                    </p>
                </form>

            </div>
        </div>
    </div>

    <div class="col-md-3 col-sm-2 col-1"></div>
</div>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script src="{% static 'js/register.js' %}"></script>
<script>
    // Add loading animation to submit button
    document.getElementById('registerForm')?.addEventListener('submit', function(e) {
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.classList.add('loading');
        submitBtn.value = 'Creating Account...';
    });

    // Password show/hide toggle
    const passwordField = document.getElementById('passwordField');
    const toggleBtn = document.getElementById('showPasswordToggle');

    if (toggleBtn && passwordField) {
        toggleBtn.addEventListener('click', function() {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            this.textContent = type === 'password' ? 'SHOW' : 'HIDE';
        });
    }

    // Add input focus animations
    document.querySelectorAll('.form-control').forEach(input => {
        input.addEventListener('focus', function() {
            this.parentElement.classList.add('focused');
        });
        
        input.addEventListener('blur', function() {
            if (!this.value) {
                this.parentElement.classList.remove('focused');
            }
        });
    });

    // Check for dark mode class on body
    function checkDarkMode() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.add('dark-mode-active');
        }
    }
    
    // Run on page load
    checkDarkMode();
    
    // If there's a dark mode toggle button, listen for it
    const darkModeToggle = document.getElementById('darkModeToggle');
    if (darkModeToggle) {
        darkModeToggle.addEventListener('click', function() {
            setTimeout(checkDarkMode, 100);
        });
    }

    // Real-time username validation
    const usernameField = document.getElementById('usernameField');
    if (usernameField) {
        usernameField.addEventListener('input', function() {
            const username = this.value;
            const feedbackDiv = document.querySelector('.invalid_feedback');
            const successDiv = document.querySelector('.usernameSuccessOutput');
            
            if (username.length < 3 && username.length > 0) {
                feedbackDiv.style.display = 'block';
                feedbackDiv.textContent = 'Username must be at least 3 characters';
                successDiv.textContent = '';
            } else if (username.length >= 3) {
                feedbackDiv.style.display = 'none';
                successDiv.textContent = '✓ Username available';
            } else {
                feedbackDiv.style.display = 'none';
                successDiv.textContent = '';
            }
        });
    }

    // Email validation
    const emailField = document.getElementById('emailField');
    if (emailField) {
        emailField.addEventListener('input', function() {
            const email = this.value;
            const feedbackDiv = document.querySelector('.emailFeedBackArea');
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (email.length > 0 && !emailPattern.test(email)) {
                feedbackDiv.style.display = 'block';
                feedbackDiv.textContent = 'Please enter a valid email address';
            } else {
                feedbackDiv.style.display = 'none';
            }
        });
    }
</script>

{% endblock content %}
