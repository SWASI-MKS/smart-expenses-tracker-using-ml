{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container">
    <br>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="page-title">Add Income</h2>

        <a href="{% url 'income' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back to Income
        </a>
    </div>

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a href="{% url 'income'%}">Income</a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">Add Income</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card income-card">
                <div class="card-body p-4">
                    <form action="{% url 'add-income' %}" method="post" class="income-form">
                        {% include 'partials/_messages.html'%} 
                        {% csrf_token %}
                        
                        <div class="form-group mb-4">
                            <label for="" class="form-label fw-semibold">Amount</label>
                            <input type="text" class="form-control form-control-lg" name="amount" 
                                   value="{{values.amount}}" placeholder="Enter amount" />
                        </div>
                        
                        <div class="form-group mb-4">
                            <label for="" class="form-label fw-semibold">Description</label>
                            <input type="text" class="form-control form-control-lg" name="description"
                                value="{{values.description}}" placeholder="Enter description" />
                        </div>
                        
                        <div class="form-group mb-4">
                            <label for="" class="form-label fw-semibold">Source</label>
                            <select class="form-select form-select-lg" name="source">
                                {% for source in sources%}
                                <option name="source" value="{{source.name}}">{{source.name}}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="form-group mb-4">
                            <label for="" class="form-label fw-semibold">Date of Income</label>
                            <input type="date" class="form-control form-control-lg" name="income_date" />
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="{% url 'income' %}" class="btn btn-outline-secondary me-md-2">
                                Cancel
                            </a>
                            <input type="submit" value="Add Income" class="btn btn-primary btn-submit" />
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>

/* ================= PAGE TITLE ================= */

.page-title{
    font-weight:700;
    font-size:1.9rem;
    background:linear-gradient(135deg,#4361ee,#7b2cbf);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ================= CARD ================= */

.income-card{
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    animation:fadeIn 0.6s ease;
    border:none;
}

.income-card .card-body{
    background:white;
}

/* ================= FORM STYLES ================= */

.form-label{
    color:#2d3748;
    font-size:1rem;
}

.form-control, .form-select{
    border-radius:12px;
    border:2px solid #e2e8f0;
    padding:12px 16px;
    transition:all 0.3s ease;
    font-size:1rem;
}

.form-control:focus, .form-select:focus{
    border-color:#4361ee;
    box-shadow:0 0 0 4px rgba(67,97,238,0.15);
    outline:none;
}

body.dark .form-control, 
body.dark .form-select{
    background:#2d2d2d;
    border-color:#404040;
    color:#e0e0e0;
}

body.dark .form-control:focus, 
body.dark .form-select:focus{
    border-color:#4361ee;
    box-shadow:0 0 0 4px rgba(67,97,238,0.25);
}

body.dark .form-label{
    color:#e0e0e0;
}

/* ================= BUTTONS ================= */

.btn-primary{
    background:linear-gradient(135deg,#4361ee,#7b2cbf);
    border:none;
    border-radius:12px;
    padding:12px 28px;
    font-weight:600;
    transition:all 0.3s ease;
}

.btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(67,97,238,0.35);
    background:linear-gradient(135deg,#3f37c9,#6b21a8);
}

.btn-outline-secondary{
    border-radius:12px;
    padding:12px 20px;
    font-weight:500;
    transition:all 0.3s ease;
}

.btn-outline-secondary:hover{
    background:#f8f9fa;
    transform:translateY(-2px);
}

body.dark .btn-outline-secondary{
    border-color:#404040;
    color:#e0e0e0;
}

body.dark .btn-outline-secondary:hover{
    background:#404040;
}

/* ================= BREADCRUMB ================= */

.breadcrumb{
    background:#f8f9ff;
    border-radius:10px;
    padding:10px 16px;
}

.breadcrumb-item a{
    color:#4361ee;
    text-decoration:none;
    transition:0.2s;
}

.breadcrumb-item a:hover{
    color:#3f37c9;
}

.breadcrumb-item.active{
    color:#6b7280;
}

body.dark .breadcrumb{
    background:#2d2d2d;
}

body.dark .breadcrumb-item.active{
    color:#9ca3af;
}

/* ================= ANIMATIONS ================= */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ================= DARK MODE ================= */

body.dark .income-card{
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

body.dark .income-card .card-body{
    background:#2d2d2d;
}

</style>

{% endblock %}
