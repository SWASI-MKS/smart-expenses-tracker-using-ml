<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thank You</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: #f8fafc;
        }
        .thank-card {
            border-radius: 14px;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card thank-card shadow-sm p-5 text-center" style="max-width:520px; width:100%;">

        <i class="fa fa-heart fa-3x text-primary mb-3"></i>

        <h3 class="mb-2">Thanks for using Smart Expense Tracking</h3>

        <p class="text-muted mt-3">
            We hope Smart Expense Tracking helped you stay organized and
            manage your finances better.
            <br><br>
            We’ll be looking forward to seeing you again 🙂
        </p>

        <div class="d-flex justify-content-center gap-3 mt-4">
            <a href="{% url 'login' %}" class="btn btn-primary px-4">
                Login
            </a>

            <a href="{% url 'register' %}" class="btn btn-outline-primary px-4">
                Register
            </a>
        </div>

    </div>
</div>

</body>
</html>
